<!DOCTYPE html>
<html lang="{{LANG}}">
<head>
  <meta charset="UTF-8">
  <style>
    @font-face {
      font-family: 'Space Grotesk';
      src: url('./fonts/SpaceGrotesk-Bold.woff2') format('woff2');
      font-weight: 700;
    }
    @font-face {
      font-family: 'DM Sans';
      src: url('./fonts/DMSans-Regular.woff2') format('woff2');
      font-weight: 400;
    }
    @font-face {
      font-family: 'DM Sans';
      src: url('./fonts/DMSans-Medium.woff2') format('woff2');
      font-weight: 500;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'DM Sans', -apple-system, sans-serif;
      font-size: 11.5px;
      line-height: 1.65;
      color: #1a1a2e;
      width: {{PAGE_WIDTH}};
    }

    .header {
      text-align: center;
      margin-bottom: 20px;
      border-bottom: 2px solid;
      border-image: linear-gradient(to right, hsl(187,74%,32%), hsl(270,70%,45%)) 1;
      padding-bottom: 12px;
    }

    .header h1 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 22px;
      font-weight: 700;
      color: #1a1a2e;
      margin-bottom: 4px;
    }

    .header .contact {
      font-size: 10px;
      color: #555;
    }

    .header .contact a {
      color: hsl(187, 74%, 32%);
      text-decoration: none;
    }

    .date {
      margin-bottom: 16px;
      font-size: 10.5px;
      color: #555;
    }

    .recipient {
      margin-bottom: 20px;
      font-size: 11px;
      line-height: 1.5;
    }

    .body p {
      margin-bottom: 14px;
      text-align: justify;
    }

    .signature {
      margin-top: 24px;
      line-height: 1.5;
    }

    .signature .name {
      font-weight: 500;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>{{NAME}}</h1>
    <div class="contact">
      {{EMAIL}} | {{LOCATION}} |
      <a href="{{LINKEDIN_URL}}">{{LINKEDIN_DISPLAY}}</a> |
      <a href="{{PORTFOLIO_URL}}">{{PORTFOLIO_DISPLAY}}</a>
    </div>
  </div>

  <div class="date">{{DATE}}</div>

  <div class="recipient">{{RECIPIENT}}</div>

  <div class="body">
    {{OPENING}}
    {{BODY}}
    {{CLOSE}}
  </div>

  <div class="signature">
    <p>{{SIGN_OFF}}</p>
    <p class="name">{{NAME}}</p>
  </div>
</body>
</html>
